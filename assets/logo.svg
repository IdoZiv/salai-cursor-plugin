<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="cartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Floating pixel squares (top-left of handle) -->
  <rect x="44" y="38" width="10" height="10" rx="1" fill="#2563EB" opacity="0.85"/>
  <rect x="58" y="30" width="13" height="13" rx="1" fill="#3B82F6" opacity="0.9"/>
  <rect x="75" y="22" width="16" height="16" rx="2" fill="#4F46E5" opacity="0.95"/>

  <!-- Cart handle -->
  <path d="M30 75 L30 58 Q30 50 38 50 L82 50" stroke="url(#cartGrad)" stroke-width="12" stroke-linecap="round" fill="none"/>

  <!-- Cart basket outline -->
  <path d="M82 50 L158 50 Q165 50 163 58 L152 118 Q150 126 142 126 L82 126 Q74 126 72 118 L61 58" stroke="url(#cartGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Circuit board lines inside cart -->
  <!-- Horizontal main lines -->
  <line x1="90" y1="80" x2="150" y2="80" stroke="url(#lineGrad)" stroke-width="2" opacity="0.7"/>
  <line x1="90" y1="95" x2="150" y2="95" stroke="url(#lineGrad)" stroke-width="2" opacity="0.7"/>
  <line x1="95" y1="110" x2="148" y2="110" stroke="url(#lineGrad)" stroke-width="2" opacity="0.7"/>
  <!-- Vertical connectors -->
  <line x1="105" y1="72" x2="105" y2="118" stroke="url(#lineGrad)" stroke-width="2" opacity="0.6"/>
  <line x1="120" y1="68" x2="120" y2="118" stroke="url(#lineGrad)" stroke-width="2" opacity="0.6"/>
  <line x1="138" y1="72" x2="138" y2="112" stroke="url(#lineGrad)" stroke-width="2" opacity="0.6"/>
  <!-- Circuit nodes (small circles) -->
  <circle cx="105" cy="80" r="3" fill="#4F46E5" opacity="0.8"/>
  <circle cx="120" cy="95" r="3" fill="#6D28D9" opacity="0.8"/>
  <circle cx="138" cy="80" r="3" fill="#7C3AED" opacity="0.8"/>
  <circle cx="105" cy="110" r="3" fill="#4F46E5" opacity="0.8"/>
  <circle cx="138" cy="110" r="3" fill="#7C3AED" opacity="0.8"/>
  <!-- Central chip -->
  <rect x="112" y="83" width="16" height="16" rx="2" fill="url(#cartGrad)" opacity="0.9"/>
  <rect x="115" y="86" width="10" height="10" rx="1" fill="#1E1B4B" opacity="0.6"/>
  <!-- Chip pins -->
  <line x1="108" y1="87" x2="112" y2="87" stroke="#6D28D9" stroke-width="1.5"/>
  <line x1="108" y1="91" x2="112" y2="91" stroke="#6D28D9" stroke-width="1.5"/>
  <line x1="128" y1="87" x2="132" y2="87" stroke="#7C3AED" stroke-width="1.5"/>
  <line x1="128" y1="91" x2="132" y2="91" stroke="#7C3AED" stroke-width="1.5"/>
  <line x1="117" y1="99" x2="117" y2="103" stroke="#6D28D9" stroke-width="1.5"/>
  <line x1="123" y1="99" x2="123" y2="103" stroke="#7C3AED" stroke-width="1.5"/>

  <!-- Speed lines under cart -->
  <line x1="30" y1="132" x2="68" y2="132" stroke="#2563EB" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="36" y1="140" x2="70" y2="140" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <line x1="42" y1="147" x2="72" y2="147" stroke="#4F46E5" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>

  <!-- Cart wheels -->
  <circle cx="95" cy="142" r="12" fill="url(#cartGrad)"/>
  <circle cx="140" cy="142" r="12" fill="url(#cartGrad)"/>
</svg>
